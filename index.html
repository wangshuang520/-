<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 微信全屏适配核心配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 禁止微信下拉回弹和页面缩放 */
        html, body {
            overscroll-behavior: none;
            touch-action: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #ededed;
        }
    </style>
</head>
<body>
    <!-- 微信界面容器（最终会被截图覆盖） -->
    <div class="wechat-container" id="capture">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <span class="status-time" id="status-time">11:40</span>
            <div class="status-right">
                <span class="hd">HD</span>
                <span class="network">5G</span>
                <div class="signal">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
                <div class="wifi">
                    <span class="wave wave1"></span>
                    <span class="wave wave2"></span>
                    <span class="wave wave3"></span>
                    <span class="dot"></span>
                </div>
                <span class="battery-text" id="battery-text">100%</span>
                <div class="battery">
                    <div class="battery-fill" id="battery-fill"></div>
                    <div class="battery-cap"></div>
                </div>
            </div>
        </div>

        <!-- 聊天头部 -->
        <div class="chat-header">
            <div class="back-btn"></div>
            <div class="unread" id="unread">40</div>
            <span class="nickname" id="nickname">A涅槃重生小王</span>
            <div class="more-btn">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <!-- 聊天内容区 -->
        <div class="chat-content">
            <div class="msg-time" id="msg-time">周一 22:16</div>
            <div class="message outgoing">
                <div class="bubble" id="bubble">
                    08-16-38-24-14-42-06-28-18<br>-32-26-04-36-12-34-22
                </div>
                <div class="avatar" id="avatar"></div>
            </div>
        </div>

        <!-- 底部输入栏 -->
        <div class="input-bar">
            <div class="voice-icon"></div>
            <div class="input-placeholder"></div>
            <div class="mic-icon"></div>
            <div class="emoji-icon"></div>
            <div class="plus-icon"></div>
        </div>
    </div>

    <!-- 截图生成库 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
